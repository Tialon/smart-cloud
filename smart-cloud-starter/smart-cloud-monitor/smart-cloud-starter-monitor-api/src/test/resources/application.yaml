spring:
  application:
    name: smart-cloud-starter-monitor-api

server:
  port: 40012

smart:
  api-monitor:
    exception-api-monitor:
      # 可先添加一个机器人，获取key后再移除机器人
      robotKey: 79445cd5-4f18-4d44-a84a-01ff147d11ae
      matchMinCount: 3
      apiReportMaxCount: 2
      defaultFailRateThreshold: 0.60
      failRateThresholds:
        '[IOrderFeign#query]': 0.1
        '[ProductService#query]': 0.1
      needAlertExceptionClassNames:
        - NullPointerException
        - UnsupportedOperationException
      needAlertExceptionCodes:
        - 500
    slow-api-monitor:
      # 可先添加一个机器人，获取key后再移除机器人
      robotKey: 79445cd5-4f18-4d44-a84a-01ff147d11ae
      apiWhiteList:
        - ProductController#whitelist
      defaultCostThreshold: 100
      apiReportMaxCount: 1
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: 'health,info'